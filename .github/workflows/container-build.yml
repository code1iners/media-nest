name: Container build

on:
  pull_request:
  workflow_dispatch:
  # Weekly uncached builds detect FFmpeg apt pins removed from Bookworm.
  schedule:
    - cron: '17 3 * * 1'

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.service }} (${{ matrix.platform }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        service: [api, worker]
        platform: [linux/amd64, linux/arm64]
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build ${{ matrix.service }} container
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/${{ matrix.service }}/Dockerfile
          platforms: ${{ matrix.platform }}
          pull: true
          push: false
          # Scheduled runs must execute apt-get instead of reusing a cached layer.
          no-cache: ${{ github.event_name == 'schedule' }}
