services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    image: mytube-extract-api:latest
    container_name: mytube-extract-api
    restart: unless-stopped
    env_file:
      - docker-compose.env
    ports:
      - "127.0.0.1:3030:3030"

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    image: mytube-extract-worker:latest
    container_name: mytube-extract-worker
    restart: unless-stopped
    env_file:
      - docker-compose.env
