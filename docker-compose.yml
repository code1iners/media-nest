services:
  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    image: mytube-extract-worker:latest
    container_name: mytube-extract-worker
    restart: unless-stopped
    env_file:
      - docker-compose.env
    volumes:
      - ${WHISPER_CPP_HOST_DIR:?Set WHISPER_CPP_HOST_DIR}:/whisper.cpp:ro
