    <text x="258" y="190" class="small mint">선택된 형식</text>
    <text x="258" y="224" class="body white">MP4 · 1080p</text>
    <text x="258" y="268" class="small weak">영상과 오디오를 함께 추출합니다.</text>
  </g>

  <g transform="translate(74 1074)">
    <rect class="panel" width="752" height="204" rx="5"/>
    <rect class="panel-inner" x="8" y="8" width="736" height="188" rx="2"/>
    <text x="30" y="58" class="label mint">▥ 작업 현황</text>
    <rect x="36" y="92" width="680" height="74" fill="#111827" stroke="#43516a" stroke-width="4"/>
    <g transform="translate(70 112)">
      <rect x="0" y="0" width="34" height="12" fill="#ffc83d"/>
      <rect x="6" y="12" width="22" height="28" fill="#ffc83d"/>
      <rect x="0" y="40" width="34" height="12" fill="#ffc83d"/>
    </g>
    <text x="134" y="138" class="body white">대기 중</text>
    <text x="260" y="138" class="small weak">URL 입력 후 추출을 시작하세요.</text>
  </g>

  <g transform="translate(74 1318)">
    <rect x="0" y="0" width="752" height="96" rx="5" fill="#111827" stroke="#a9b4c7" stroke-width="4" filter="url(#pixelShadow)"/>
    <rect x="0" y="0" width="376" height="96" rx="5" fill="#111827" stroke="#ffc83d" stroke-width="6"/>
    <rect x="376" y="0" width="376" height="96" fill="#111827" stroke="#43516a" stroke-width="4"/>
    <g transform="translate(82 28)">
      <rect x="0" y="2" width="54" height="38" fill="none" stroke="#ffc83d" stroke-width="6"/>
      <path d="M22 12v18l18-9z" fill="#ffc83d"/>
