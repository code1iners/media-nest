    <g transform="translate(464 28)" opacity=".78">
      <rect x="0" y="0" width="58" height="42" fill="none" stroke="#bac4d3" stroke-width="6"/>
      <rect x="12" y="14" width="12" height="6" fill="#bac4d3"/>
      <rect x="32" y="14" width="14" height="6" fill="#bac4d3"/>
      <rect x="12" y="28" width="34" height="6" fill="#bac4d3"/>
      <path d="M18 42l-8 14h24z" fill="#bac4d3"/>
      <text x="96" y="34" class="label muted">자막 추출</text>
    </g>
