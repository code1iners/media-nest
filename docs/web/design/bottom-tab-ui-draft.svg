<svg xmlns="http://www.w3.org/2000/svg" width="900" height="1500" viewBox="0 0 900 1500">
  <defs>
    <pattern id="grid12" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M24 0H0V24" fill="none" stroke="#a9b4c7" stroke-opacity=".055" stroke-width="2"/>
    </pattern>
    <pattern id="grid6" width="8" height="8" patternUnits="userSpaceOnUse">
      <path d="M8 0H0V8" fill="none" stroke="#a9b4c7" stroke-opacity=".03" stroke-width="1"/>
    </pattern>
    <filter id="pixelShadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="9" stdDeviation="0" flood-color="#050912"/>
      <feDropShadow dx="0" dy="16" stdDeviation="14" flood-color="#000000" flood-opacity=".26"/>
    </filter>
    <style>
      text {
        font-family: Lana, "Courier New", monospace;
        letter-spacing: 0;
      }
      .panel {
        fill: #1d2637;
        stroke: #a9b4c7;
        stroke-width: 4;
        filter: url(#pixelShadow);
      }
      .panel-inner {
        fill: none;
        stroke: #050912;
        stroke-width: 4;
      }
      .muted { fill: #bac4d3; }
      .weak { fill: #8592a8; }
      .gold { fill: #ffc83d; }
      .mint { fill: #62e88a; }
      .white { fill: #f4f7fb; }
      .label {
        font-size: 26px;
        font-weight: 900;
      }
      .body {
        font-size: 24px;
        font-weight: 800;
      }
      .small {
        font-size: 20px;
        font-weight: 800;
      }
      .title {
        font-size: 56px;
        font-weight: 950;
      }
    </style>
  </defs>

  <rect width="900" height="1500" fill="#090f1a"/>
  <rect width="900" height="1500" fill="url(#grid12)"/>
  <rect width="900" height="1500" fill="url(#grid6)"/>
  <circle cx="650" cy="120" r="250" fill="#62e88a" opacity=".06"/>

  <rect x="34" y="38" width="832" height="1424" rx="28" fill="#0b1220" stroke="#050912" stroke-width="8"/>
  <rect x="52" y="56" width="796" height="1388" rx="18" fill="#090f1a" stroke="#293348" stroke-width="3"/>

  <g transform="translate(74 82)">
    <rect class="panel" width="752" height="178" rx="5"/>
