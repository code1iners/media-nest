    <line x1="30" x2="722" y1="86" y2="86" stroke="#43516a" stroke-width="4" stroke-dasharray="8 8"/>

    <rect x="36" y="120" width="190" height="132" fill="#203049" stroke="#a9b4c7" stroke-width="4"/>
    <rect x="48" y="132" width="166" height="108" fill="#87bff0"/>
    <rect x="48" y="198" width="166" height="42" fill="#3a8e4b"/>
    <rect x="80" y="176" width="88" height="52" rx="3" fill="#d84034" stroke="#050912" stroke-width="6"/>
    <path d="M112 188v28l28-14z" fill="#f4f7fb"/>
