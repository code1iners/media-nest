    <rect x="34" y="298" width="328" height="62" rx="3" fill="#293344" stroke="#ffc83d" stroke-width="4"/>
    <rect x="390" y="298" width="328" height="62" rx="3" fill="#293348" stroke="#43516a" stroke-width="4"/>
    <g transform="translate(68 315)">
