    <rect x="630" y="30" width="74" height="18" fill="#111827" stroke="#050912" stroke-width="4"/>
    <path d="M630 30h18v18h-18zM666 30h18v18h-18z" fill="#ffc83d"/>
    <text x="34" y="66" class="small gold">PIXEL EXTRACTION CONSOLE</text>
    <text x="34" y="130" class="title white">MyTube <tspan class="gold">Extract</tspan></text>
    <g transform="translate(632 72)">
      <rect x="0" y="0" width="68" height="68" fill="#2a3448" stroke="#aeb8c9" stroke-width="6"/>
